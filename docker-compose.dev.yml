services:
  app-dev:
    image: node:22-bookworm
    working_dir: /workspaces/solaris-cet
    volumes:
      - .:/workspaces/solaris-cet
      - root_node_modules:/workspaces/solaris-cet/node_modules
      - app_node_modules:/workspaces/solaris-cet/app/node_modules
    environment:
      - DATABASE_URL=postgres://solaris:solaris@postgres:5432/solaris_cet
      - JWT_SECRET=dev-only-change-me
    ports:
      - "5173:5173"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: bash -lc "npm ci && npm run app:dev -- --host 0.0.0.0 --port 5173"

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=solaris_cet
      - POSTGRES_USER=solaris
      - POSTGRES_PASSWORD=solaris
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  redis_data:
  root_node_modules:
  app_node_modules:

