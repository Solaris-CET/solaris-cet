<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solaris CET | The Bridge to High Intelligence</title>
  <meta name="description" content="Solaris CET – Evolving current Artificial Intelligence, autonomous agents, and algorithms into the next generation of Superior Intelligence." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 50% 40%, #0d1340 0%, #080a1a 45%, #000000 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      color: #fff;
      overflow-x: hidden;
    }

    /* Subtle animated star field */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 90%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 45%, rgba(0,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 50%, rgba(0,255,255,0.2) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem 2rem;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 760px;
      gap: 0;
    }

    /* Logo */
    .hero-logo {
      max-width: 320px;
      width: 80vw;
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.4), 0 0 80px rgba(0, 200, 255, 0.15);
      margin-bottom: 2rem;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 40px rgba(0, 255, 255, 0.4), 0 0 80px rgba(0, 200, 255, 0.15); }
      50%       { box-shadow: 0 0 60px rgba(0, 255, 255, 0.6), 0 0 120px rgba(0, 200, 255, 0.25); }
    }

    /* Headline */
    .hero-headline {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 0%, #00e5ff 60%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 18px rgba(0, 229, 255, 0.45));
      margin-bottom: 1.25rem;
    }

    /* Sub-headline */
    .hero-sub {
      font-size: clamp(0.95rem, 2.2vw, 1.15rem);
      font-weight: 400;
      line-height: 1.7;
      color: rgba(200, 230, 255, 0.78);
      max-width: 600px;
      margin-bottom: 2.5rem;
    }

    /* CTA buttons container */
    .cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.3s ease, filter 0.3s ease;
      position: relative;
      z-index: 1;
    }

    /* Primary – Neon Gold */
    .btn-primary {
      background: linear-gradient(135deg, #c8960c 0%, #ffd700 50%, #e6b800 100%);
      color: #0a0a0f;
      box-shadow: 0 0 16px rgba(255, 215, 0, 0.5), 0 4px 20px rgba(255, 215, 0, 0.2);
      border: 1px solid rgba(255, 215, 0, 0.6);
    }

    .btn-primary:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.75), 0 8px 32px rgba(255, 215, 0, 0.35);
      filter: brightness(1.1);
    }

    /* Secondary – Electric Cyan */
    .btn-secondary {
      background: transparent;
      color: #00e5ff;
      border: 2px solid rgba(0, 229, 255, 0.65);
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.3), inset 0 0 12px rgba(0, 229, 255, 0.07);
    }

    .btn-secondary:hover {
      transform: translateY(-2px) scale(1.03);
      background: rgba(0, 229, 255, 0.1);
      box-shadow: 0 0 28px rgba(0, 229, 255, 0.6), inset 0 0 20px rgba(0, 229, 255, 0.12);
    }

    /* Footer */
    footer {
      width: 100%;
      text-align: center;
      padding: 1.25rem 1.5rem;
      font-size: 0.8rem;
      color: rgba(150, 180, 220, 0.5);
      letter-spacing: 0.03em;
      position: relative;
      z-index: 1;
    }

    footer::before {
      content: '';
      display: block;
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.3), transparent);
      margin: 0 auto 0.75rem;
    }

    @media (max-width: 480px) {
      .cta-group {
        flex-direction: column;
        align-items: stretch;
      }
      .btn {
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <main>
    <section class="hero">
      <img
        src="https://scarlet-past-walrus-15.mypinata.cloud/ipfs/bafkreid6hoewfj66y6wwefhiyp46madxlqtgnvut6tz7y2i4xwbj5yda3a"
        alt="Solaris CET Core"
        class="hero-logo"
      />

      <h1 class="hero-headline">The Bridge to High Intelligence</h1>

      <p class="hero-sub">
        Evolving current Artificial Intelligence, autonomous agents, and algorithms
        into the next generation of Superior Intelligence.
      </p>

      <div class="cta-group">
        <a
          href="https://dedust.io/pools/EQB5_hZPl4-EI1aWdLSd21c8T9PoKyZK2IJtrDFdPJIelfnB/deposit"
          class="btn btn-primary"
        >
          Trade / Deposit on DeDust
        </a>
        <a
          href="https://scarlet-past-walrus-15.mypinata.cloud/ipfs/bafkreieggm2l7favvjw4amybbobastjo6kcrdi33gzcvtzrur5opoivd3a"
          class="btn btn-secondary"
          target="_blank"
          rel="noopener noreferrer"
        >
          Read Whitepaper (IPFS)
        </a>
      </div>
    </section>
  </main>

  <footer>
    Copyright 2026 Solaris CET. Open Source AI &amp; Web3 Infrastructure.
  </footer>

</body>
</html>
