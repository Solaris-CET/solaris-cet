name: TON Chain Indexer

on:
  schedule:
    # Run every hour
    - cron: "0 * * * *"
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      - name: Install indexer dependencies
        working-directory: scripts
        run: npm ci --legacy-peer-deps

      - name: Run TON indexer
        working-directory: scripts
        run: npm run index

      - name: Commit and push if state changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add app/public/api/state.json

          # Only commit (and trigger a Pages redeploy) when data has actually changed
          if git diff --cached --quiet; then
            echo "No changes to state.json — skipping commit."
          else
            git commit -m "chore(data): update CET token state [skip ci]"
            git push || echo "Push skipped — branch may be protected or up to date."
          fi
