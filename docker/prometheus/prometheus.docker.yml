global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: solaris
    metrics_path: /metrics
    static_configs:
      - targets: ["solaris:3000"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
