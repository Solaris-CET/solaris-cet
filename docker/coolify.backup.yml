services:
  db_backup:
    image: postgres:16-alpine
    working_dir: /repo
    volumes:
      - ../:/repo:ro
      - solaris_cet_backups:/backups
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BACKUP_DIR=/backups
      - BACKUP_PREFIX=solaris-cet
      - BACKUP_KEEP_DAYS=${BACKUP_KEEP_DAYS:-14}
      - BACKUP_PASSPHRASE=${BACKUP_PASSPHRASE}
    command: sh -lc "apk add --no-cache openssl >/dev/null && chmod +x /repo/scripts/pg-backup.sh && /repo/scripts/pg-backup.sh"

volumes:
  solaris_cet_backups:
